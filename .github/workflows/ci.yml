name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check 1 - Prisma Validate
        run: npx prisma validate

      - name: Check 2 - Code Linting
        run: npm run lint

      - name: Check 3 - Type Checking
        run: npx tsc --noEmit

      - name: Check 4 - Build Verification
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Check 5 - Dependency Audit
        run: npm audit --audit-level=high

